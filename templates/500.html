<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>500 - Server Error</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0b;
            color: #ffffff;
            line-height: 1.6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .error-container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 5px;
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 15px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .error-description {
            font-size: 14px;
            color: #a0a0a0;
            margin-bottom: 40px;
            line-height: 1.7;
            letter-spacing: 0.3px;
        }

        .error-illustration {
            font-size: 64px;
            margin-bottom: 40px;
            opacity: 0.5;
        }

        .error-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 2px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            text-align: center;
            transition: all 0.2s ease;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #ffffff;
            color: #0b0b0b;
        }

        .btn-primary:hover {
            background: #e0e0e0;
        }

        .btn-secondary {
            background: transparent;
            color: #ffffff;
            border: 1px solid #333333;
        }

        .btn-secondary:hover {
            border-color: #666666;
        }

        .btn:active {
            transform: translateY(1px);
        }

        @media (min-width: 768px) {
            .error-actions {
                flex-direction: row;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">Something Went Wrong</h1>
        <p class="error-description">We're experiencing technical difficulties. Please try again later.</p>

        <div class="error-illustration">⚠️</div>

        <div class="error-actions">
            <a href="/" class="btn btn-primary">Go to Home</a>
            <button onclick="window.location.reload()" class="btn btn-secondary">Refresh Page</button>
        </div>
    </div>
</body>
</html>
