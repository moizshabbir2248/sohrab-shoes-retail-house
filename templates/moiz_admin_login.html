<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Premium Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { surface: '#0f0f0f', card: '#1a1a1a', border: '#2a2a2a', muted: '#a0a0a0' },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');</style>
</head>
<body class="bg-surface text-white font-sans antialiased min-h-screen flex items-center justify-center p-4">
    <div class="bg-card border border-border rounded-xl p-8 w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="text-4xl mb-2">&#128274;</div>
            <h1 class="text-xl font-bold tracking-wider uppercase">Admin Login</h1>
            <p class="text-sm text-muted mt-1">Premium Store Dashboard</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="mb-4 px-4 py-3 rounded text-sm bg-red-900/40 border border-red-700 text-red-300">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-5">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="email" class="text-[11px] font-medium text-muted tracking-wider uppercase block mb-1.5">Admin Email</label>
                <input type="email" id="email" name="email" placeholder="admin@example.com" required class="w-full bg-surface border border-border rounded-lg px-4 py-3 text-sm text-white placeholder-muted/40 outline-none focus:border-white transition-colors">
            </div>
            <div>
                <label for="password" class="text-[11px] font-medium text-muted tracking-wider uppercase block mb-1.5">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required class="w-full bg-surface border border-border rounded-lg px-4 py-3 text-sm text-white placeholder-muted/40 outline-none focus:border-white transition-colors">
            </div>
            <button type="submit" class="w-full bg-white text-black text-xs font-bold tracking-[2px] uppercase py-4 rounded-lg hover:bg-neutral-200 transition-all">Login to Dashboard</button>
        </form>
        <div class="text-center mt-5"><a href="/" class="text-xs text-muted hover:text-white transition-colors">&larr; Back to Store</a></div>
    </div>
</body>
</html>
