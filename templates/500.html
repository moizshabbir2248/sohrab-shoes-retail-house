<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>500 - Server Error</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { surface: '#0f0f0f', card: '#1a1a1a', border: '#2a2a2a', muted: '#a0a0a0' },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');</style>
</head>
<body class="bg-surface text-white font-sans antialiased min-h-screen flex items-center justify-center p-4">
    <div class="text-center max-w-md">
        <div class="text-[120px] font-bold leading-none tracking-wider">500</div>
        <h1 class="text-2xl font-bold mt-6 mb-3 tracking-wider uppercase">Something Went Wrong</h1>
        <p class="text-sm text-muted leading-relaxed mb-8">We're experiencing technical difficulties. Please try again later.</p>
        <div class="text-6xl mb-8 opacity-40">&#9888;&#65039;</div>
        <div class="space-y-3">
            <a href="/" class="block w-full bg-white text-black text-xs font-bold tracking-[2px] uppercase py-4 rounded-lg hover:bg-neutral-200 transition-all">Go to Home</a>
            <button onclick="window.location.reload()" class="block w-full border border-border text-muted text-xs font-bold tracking-[2px] uppercase py-4 rounded-lg hover:border-white hover:text-white transition-all">Refresh Page</button>
        </div>
    </div>
</body>
</html>
